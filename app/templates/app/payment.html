<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Rubik:ital@0;1&display=swap');

@font-face {
  font-family: playwrite;
  src: url(../fonts/PlaywriteFRTrad-VariableFont_wght.ttf);
}
@font-face {
  font-family: lobster;
  src: url(../fonts/Lobster-Regular.ttf);
}
@font-face {
  font-family: handmades;
  src: url(../fonts/Handmades.ttf);
}
@font-face {
  font-family: heroes;
  src: url(../fonts/Heroes\ Legend\ Hollow.ttf);
}

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Rubik", sans-serif;
}

    .main{
    background-size: cover;
    background-position: center;
    height: 100vh;
    width: 100vw;
}

.main h1{
    font-size: 2rem;
    font-weight: 300;
    font-family: "Pacifico", cursive;
    color: white;
}

.main p{
    font-size: 2rem;
    font-weight: 300;
    color: black;
}

.header{
    position: sticky ;
    top: 0;
    backdrop-filter: blur(35px);
    z-index: 9;
    width: 100%;
}

.bg-holder{
    position: absolute;
    width: 100%;
    min-height: 100vh;
    top: 0;
    left: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 1;
}

.formsall{
    width: 350px;
    height: 350px;
    backdrop-filter: blur(25px);
    border-radius: 20px;
    box-shadow: 0px 0px 20px white;
    border: 2px solid white;
    margin: auto;
}

.formsall h1{
    font-size: 2rem;
    font-weight: 300;
    font-family: "Pacifico", cursive;
    color: white;
    text-shadow: 1px 1px 2px purple;
}

.formsall p{
    font-size: 1.5rem;
    font-weight: 300;
    color: black;
    margin-top: 10px;
}

.footerheading{
    font-family: al;
}

.form-control::placeholder {
    color: black;
    opacity: 0.5;
}

.box{
    width: 330px;
    height: 150px;
    background-color: aqua;
    border-radius: 10px;
}

.box h1{
    font-weight: 700;
    color: blue;
}

.box p{
    color: red;
    font-weight: 700;
}

.btn1{
    color: black;
    background-color: transparent;
    border-radius: 15px;
    font-size: 1rem;
    padding: 5px;
    border: 1px solid black;
    font-weight: 700;
}

.btn2{
    color: white;
    background-color: blue;
    border-radius: 15px;
    border: none;
    font-size: 1rem;
    font-weight: 600;
    padding: 5px;
}

label{
    font-weight: 700;
}



</style>
</head>
<body>
    <div class="container text-center header">
        <header>
            <div class="row">
                <div class="col-12 col-md-6 col-sm-6 mt-2">
                    <h1 class="title">Thunikadai</h1>
                </div>
                <div class="col-12 col-md-6 col-sm-6 pt-2">
                    <nav>
                        <ul class="list-inline">
                            <li class="nav-item dropdown list-inline-item link">
                                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                    <span><i class="fa-solid fa-globe"></i> English</span>
                                </a>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="#">Japanese</a></li>
                                    <li><a class="dropdown-item" href="#">Chinese</a></li>
                                </ul>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </header>
    </div>

    <section class="payment pb-5 ps-5">
        <div class="container">
            <div class="row">
                <div class="col-lg-6 float-start p-3 text-center">
                    <div class="formsall text-center mt-5 pt-2">
                        <form action="" method="POST">
                            {% csrf_token %} 
                        <div class="input-group align-items-center pt-2">
                            <label for="cardnumber" class="pe-2">Card Number</label><br>
                            <input type="text" name="cardnumber" id="cardnumber" placeholder="1234 1234 1234 1234" class="form-control form-control-lg mx-5 bg-transparent text-black fs-6 cardnumber" required>
                        </div>
                        <div class="input-group pt-4">
                            <label for="expirationdate">Expiration date</label><br>
                            <input type="text" name="expirationdate" id="expirationdate" placeholder="MM/YY" class="form-control form-control-lg mx-5 bg-transparent text-black fs-6" required>
                        </div>
                        <div class="input-group pt-4">
                            <label for="mobile">Mobile</label><br>
                            <input type="text" name="mobile" id="mobile" placeholder="mobile" class="form-control form-control-lg mx-5 bg-transparent text-black fs-6" required>
                        </div>
                        <div class="input-group pt-4">
                            <label for="email">Email</label><br>
                            <input type="email" name="email" id="email" placeholder="jailthunikadai@gmail.com" class="form-control form-control-lg mx-5 bg-transparent text-black fs-6" required>
                        </div>
                        <div class="input-group pt-4">
                            <label class="pe-5" for="country">Country</label><br>
                            <select class="w-50 " name="country" id="country">
                                <option value="India">India</option>
                                <option value="China">China</option>
                                <option value="USA">USA</option>
                                <option value="Pakistan">Pakistan</option>
                            </select>
                        </div>
                        <button type="submit" class="text-center btn2 mx-5 mt-3">Proceed</button>
                        <div class="input-group pt-4">
                        <p class="fs-6 pe-5">By providing your card information, you allow NaughtyKids Inc to charge your card for future payments in accordance with their terms.</p>
                        </div>
                        </form>
                    </div>
                </div>
                <div class="col-lg-6 float-end pt-5 mt-5">
                    <div class="box p-3 text-center mt-5">
                        <h1>Your Plan</h1>
                        <p><span>Thunikadai Payment</span><br>
                    </div>
                    <div class="buttons">
                    <a href="{% url 'home' %}"><button class="text-center btn1 mx-5 mt-3">Go Back</button></a>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <script>
        const cardInput = document.getElementById('cardnumber');

        cardInput.addEventListener('input', (event) => {
            let input = event.target.value;

            // Remove non-digit characters
            input = input.replace(/\D/g, '');

            // Add spaces after every 4 digits
            input = input.match(/.{1,4}/g)?.join(' ') || '';

            // Set the formatted value back to the input
            event.target.value = input;
        });

        const expriyInput = document.getElementById('expirationdate');

        expirationdate.addEventListener('input', (event) => {
            let input = event.target.value;

            // Remove non-digit characters
            input = input.replace(/\D/g, '');

            // Add spaces after every 4 digits
            input = input.match(/.{1,2}/g)?.join('/') || '';

            // Set the formatted value back to the input
            event.target.value = input;
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
</body>
</html>
