<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscriber Details</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
    <link rel="stylesheet" href="{% static '/css/login.css' %}">
    <style>
.form1{
    margin: auto;
}

.form2{
    margin: auto;
}

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Rubik", sans-serif;
}

    .main{
    background-size: cover;
    background-position: center;
    position: fixed;
    height: 100vh;
    width: 100vw;
}

.main h1{
    font-size: 2rem;
    font-weight: 300;
    font-family: "Pacifico", cursive;
    color: red;
    text-shadow: 1px 1px 2px black;
    font-style: italic;
}

.main p{
    font-size: 2rem;
    font-weight: 700;
    color: black;
    text-shadow: 0px 0px 5px green;
}

.popup{
    position: relative;
    margin: auto;
    margin-top: 150px;
    border-radius: 20px;
    background-color: aqua;
    z-index: 1;
    backdrop-filter: blur(10px);
    border: 2px solid black;
    box-shadow: 0px 0px 30px hotpink;
}

.btn0{
    padding: 5px;
    border-radius: 5px;
    background-color: transparent;
    color: black;
    box-shadow: white;
    border: 5px double blue;
}

.contents{
    border-radius: 2em;
}

.contents h1{
    font-size: 2rem;
}

.heading{
    box-shadow: 2px 2px 2px black;
    border-radius: 2em;
    
}

.box{
    border-radius: 2em;
}


    </style>
</head>
<body>
    <section class="header ms-5 me-5 border shadow box-area">
        <div class="container">
            <header class="p-1">
                <div class="row">
                    <div class="col-12 col-md-6 pt-2">
                        <h1 class="title">Jail Thunikadai</h1>
                    </div>
                </div>
            </header>
        </div>
    </section>

    <section class="contents bg-info p-5 text-center m-5 shadow">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-12 col-sm-12 col-md-12">
                    <div class="excel">
                        <h1 class="heading text-danger bg-light mb-3 shadow border">Subscribers Details</h1>
                        {% if data %}
                        <div class="box table-responsive shadow" id="no-more-tables">
                            <table class="table table-hover">
                                <thead class="bg-dark text-white">
                                    <tr>
                                        <th scope="col">CARD NUMBER</th>
                                        <th scope="col">EXPRIATION DATE</th>
                                        <th scope="col">MOBILE</th>
                                        <th scope="col">EMAIL</th>
                                    </tr>
                                </thead>
                            {% for i in data %}
                            <tr>
                                <td>{{i.cardnumber}}</td>
                                <td>{{i.expirationdate}}</td>
                                <td>{{i.mobile}}</td>
                                <td>{{i.email}}</td>
                            </tr>
                            {% endfor %}
                        </table>
                        {% else %}
                        <p>No Records Found</p>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
